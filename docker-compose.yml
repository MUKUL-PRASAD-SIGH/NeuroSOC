networks:
  neuroshield-net:
    driver: bridge
  sandbox-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: neuroshield-zookeeper
    networks: [neuroshield-net]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: neuroshield-kafka
    networks:
      - neuroshield-net
      - sandbox-net
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: neuroshield-postgres
    networks:
      - neuroshield-net
      - sandbox-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neuroshield
      POSTGRES_USER: ns_user
      POSTGRES_PASSWORD: ns_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ns_user -d neuroshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neuroshield-redis
    networks: [neuroshield-net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NEUROSHIELD MICROSERVICES
  # ─────────────────────────────────────────
  ingestion:
    build: ./ingestion-service
    container_name: neuroshield-ingestion
    networks: [neuroshield-net]
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      INGESTION_MODE: all
      DATA_DIR: /data/pcap
      KAFKA_PRODUCER_RETRIES: "10"
      KAFKA_PRODUCER_DELAY: "15"
      KAFKA_SETUP_RETRIES: "10"
      KAFKA_SETUP_DELAY: "15"
    restart: unless-stopped

  feature:
    build: ./feature-service
    container_name: neuroshield-feature
    networks: [neuroshield-net]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      FLOW_TIMEOUT_SECONDS: "3"
    restart: unless-stopped

  inference:
    build: ./inference-service
    container_name: neuroshield-inference
    networks:
      - neuroshield-net
      - sandbox-net
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/models
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql://ns_user:ns_pass@postgres:5432/neuroshield
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /models
      FEATURE_COLUMNS_PATH: /data/feature_columns.txt
      SANDBOX_CONFIDENCE_THRESHOLD: "0.50"
      SANDBOX_BASE_URL: http://sandbox:8001
    restart: unless-stopped

  sandbox:
    build: ./sandbox-service
    container_name: neuroshield-sandbox
    profiles: ["phase10plus"]
    networks:
      - sandbox-net
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql://ns_user:ns_pass@postgres:5432/neuroshield
      SANDBOX_TIMEOUT_SEC: "300"
    restart: unless-stopped

  feedback:
    build: ./feedback-service
    container_name: neuroshield-feedback
    profiles: ["phase8plus"]
    networks: [neuroshield-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql://ns_user:ns_pass@postgres:5432/neuroshield
      POLL_INTERVAL_SECONDS: "30"
    restart: unless-stopped

  retraining:
    build:
      context: .
      dockerfile: retraining-service/Dockerfile
    container_name: neuroshield-retraining
    profiles: ["phase8plus"]
    networks: [neuroshield-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./models:/models
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql://ns_user:ns_pass@postgres:5432/neuroshield
      RETRAIN_MIN_FEEDBACK_SAMPLES: "3"
      RETRAIN_INTERVAL_SECONDS: "30"
      MODEL_VERSION_FILE: /models/model_version.json
      RETRAIN_STATE_FILE: /models/retraining_state.json
      INFERENCE_RELOAD_URL: http://inference:8000/models/reload
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: neuroshield-dashboard
    profiles: ["phase11plus"]
    networks: [neuroshield-net]
    ports:
      - "3000:80"
    restart: unless-stopped

  simulation_portal:
    build: ./simulation_portal
    container_name: neuroshield-portal
    profiles: ["phase11plus"]
    networks: [neuroshield-net]
    ports:
      - "3001:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: neuroshield-prometheus
    profiles: ["ops"]
    networks: [neuroshield-net]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: neuroshield-grafana
    profiles: ["ops"]
    networks: [neuroshield-net]
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: neuroshield_admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped
