global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: neuroshield-inference
    static_configs:
      - targets: ["inference:8000"]
    metrics_path: /metrics

  - job_name: neuroshield-sandbox
    static_configs:
      - targets: ["sandbox:8001"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
